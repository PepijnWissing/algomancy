[project]
name = "algomancy-quickstart"
version = "0.6.0"
description = "Interactive CLI wizard for setting up Algomancy applications."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "algomancy-utils",
    "algomancy-content",
    "algomancy-data",
    "algomancy-gui",
    "click>=8.0.0",
    "jinja2>=3.0.0",
    "rich>=13.0.0",
]

[build-system]
requires = ["uv_build>=0.9.6,<0.10.0"]
build-backend = "uv_build"

[tool.uv]
package = true
include = [
    "src/algomancy_quickstart/templates/**/*",
]